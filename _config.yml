remote_theme: "mmistakes/minimal-mistakes"
minimal_mistakes_skin: "air"

# Site Settings
locale: "en-US"
title: "Swarnali Guha"
title_separator: "|"
subtitle: "Senior Full Stack Architect | Azure Certified (AZ-204)"
name: "Swarnali Guha"
description: "Senior Full Stack Engineer with 11.5+ years of experience in .NET Core, React, and Azure Cloud Architecture."
url: "https://swguha.github.io"
baseurl: ""
repository: "swguha/swguha.github.io"

# Site Author
author:
  name: "Swarnali Guha"
  avatar: "/assets/images/profile.jpg"
  bio: "11.5+ years experience. **Microsoft Certified Azure Developer (AZ-204)**. Specialist in .NET Core, React, and building enterprise systems for global clients like IBM."
  location: "Bengaluru, India"
  links:
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "http://linkedin.com/in/swarnali-guha-profile"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/swguha"
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:swguha@gmail.com"

# Reading Files
include:
  - .htaccess
  - _pages
exclude:
  - vendor
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - node_modules
  - package.json
  - package-lock.json
  - /docs
  - /test
  - /_data
  - /_posts
  - /_includes
  - /_layouts
  - /_sass
  - README.md

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# Layout Defaults
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
