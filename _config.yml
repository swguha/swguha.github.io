# --- Theme Settings ---
remote_theme            : "mmistakes/minimal-mistakes"
minimal_mistakes_skin    : "air" # A clean, professional look for senior engineers

# --- Site Settings ---
locale                   : "en-US"
title                    : "Swarnali Guha"
title_separator          : "|"
subtitle                 : "Senior Full Stack Architect & Tech Lead"
name                     : "Swarnali Guha"
description              : "Lead Engineer with 11.5+ years of experience in .NET Core, ReactJS, and Azure. Specialized in architecting scalable enterprise solutions."
url                      : "https://swguha.github.io"
baseurl                  : "" 
repository               : "swguha/swguha.github.io"
words_per_minute         : 200
enable_copy_code_button  : true

# --- Search ---
search                   : true
search_full_content      : true
search_provider          : lunr

# --- Site Author ---
author:
  name             : "Swarnali Guha"
  avatar           : "/assets/images/profile.jpg" # Add her professional photo to this path
  bio              : "11.5+ years of expertise building **mission-critical** apps. **Microsoft Certified Azure Developer Associate** specialized in .NET Core & React."
  location         : "Kolkata, India (Available Globally)"
  email            : "swguha@gmail.com"
  links:
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "http://linkedin.com/in/swarnali-guha-profile"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/swguha"
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:swguha@gmail.com"

# --- Footer ---
footer:
  links:
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "http://linkedin.com/in/swarnali-guha-profile"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/swguha"
  since: "2024"

# --- Reading Files ---
include:
  - .htaccess
  - _pages
exclude:
  - vendor
  - .bundle
  - node_modules
  - package.json
  - package-lock.json
  - README.md

# --- Conversion & Plugins ---
markdown: kramdown
highlighter: rouge
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# --- Defaults for Pages ---
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true # This ensures her bio/skills are always visible on the left
      share: true
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: true
      related: true
